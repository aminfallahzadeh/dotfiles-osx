# font
font_family        Maple Mono NF
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 12

enable_audio_bell no

remember_window_size  no
initial_window_width  120c
initial_window_height 38c

window_padding_width 5 10 5

active_border_color #403d52

inactive_border_color #403d52

confirm_os_window_close 0

disable_ligatures always

tab_bar_margin_width 5.0

tab_bar_margin_height 10.0 0.0

tab_bar_style custom

tab_bar_min_tabs 1

macos_titlebar_color background
macos_show_window_title_in none

map cmd+enter       new_window_with_cwd

map cmd+w close_window

map shift+cmd+j next_window

map shift+cmd+k previous_window

map cmd+t new_tab_with_cwd


# NERDFONTS
include nerdfonts.conf
# BEGIN_KITTY_THEME
# Rosé Pine
# include nord.conf
# END_KITTY_THEME
